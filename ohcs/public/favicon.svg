<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Only Humans Can Score">
  <title>Only Humans Can Score</title>
  <defs>
    <linearGradient id="rb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#e0566b"/>
      <stop offset="22%" stop-color="#e89c4b"/>
      <stop offset="44%" stop-color="#e7cf52"/>
      <stop offset="64%" stop-color="#5fae7a"/>
      <stop offset="82%" stop-color="#4f8fbf"/>
      <stop offset="100%" stop-color="#8a6fc0"/>
    </linearGradient>
  </defs>
  <!-- dark museum tile so the mark holds shape on light or dark tab bars -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#15141a"/>
  <!-- folder back/tab -->
  <path d="M6 11.5 a2 2 0 0 1 2-2 h5 l2 2.2 h9 a2 2 0 0 1 2 2 V23 a2 2 0 0 1-2 2 H8 a2 2 0 0 1-2-2 Z"
        fill="url(#rb)"/>
  <!-- folder front face, slightly lifted, same gradient a shade brighter -->
  <path d="M6.6 14.4 h18.8 a1.6 1.6 0 0 1 1.57 1.93 l-1.3 6.2 A2 2 0 0 1 23.7 24.2 H9 a2 2 0 0 1-1.96-1.6 l-1.2-6.2 A1.4 1.4 0 0 1 6.6 14.4 Z"
        fill="url(#rb)" opacity="0.92"/>
  <!-- a thin dark gap to read the front edge -->
  <path d="M6.6 14.4 h18.8 a1.6 1.6 0 0 1 1.4 0.9 H5.2 a1.4 1.4 0 0 1 1.4-0.9 Z" fill="#15141a" opacity="0.45"/>
</svg>
