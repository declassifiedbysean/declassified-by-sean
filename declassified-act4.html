<body>
<div id="app"></div>
<div class="lib-overlay" id="libOverlay">
  <div class="lib-sheet">
    <div class="lib-sheet-hdr">PATTERN LIBRARY — PHILLIPS EDITION (ACT IV)<button class="close-lib" id="closeLib">✕</button></div>
    <div class="lib-intro">Act IV introduces seven new patterns specific to executive governance and second-term political rhetoric. Three patterns carry over from Act II (labeled). All definitions describe rhetorical mechanisms, not intent.</div>
    <div id="libEntries"></div>
  </div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────

// Act IV Phillips Edition — 7 new patterns + 3 carryovers
const PATTERNS = [
  {id:'INFLATED_METRIC',         name:'Inflated Metric',             tag:'ACT IV NEW', def:'Citing a numerical figure that is accurate in isolation but systematically overstated through definitional expansion, double-counting, or projection as though it were a realized result. The number is real; what it purports to represent is not.'},
  {id:'FRAMING_INVERSION',       name:'Framing Inversion',           tag:'ACT IV NEW', def:'Characterizing a mechanism primarily associated with one function (e.g., accountability restriction) in terms of its opposite function (e.g., accountability enhancement). The label and the structural effect run in contrary directions.'},
  {id:'CONSTITUTIONAL_MISREAD',  name:'Constitutional Misreading',   tag:'ACT IV NEW', def:'Citing constitutional authority for an action while the relevant text, binding precedent, or plain-language interpretation directly forecloses or qualifies that reading. Distinguished from good-faith legal dispute by the directness of the textual contradiction.'},
  {id:'LEGAL_OVERREACH',         name:'Legal Overreach',             tag:'ACT IV NEW', def:'Invoking an existing legal authority — statute, executive order, or treaty — for a purpose that exceeds or contradicts its defined scope, as established by judicial interpretation, legislative history, or the statute\'s own limiting language.'},
  {id:'STRATEGIC_AMBIGUITY',     name:'Strategic Ambiguity',         tag:'ACT IV NEW', def:'Issuing a statement sufficiently open that it can be construed as either a threat or a preference, or as either serious or rhetorical, depending on the audience — while denying the more provocative reading when challenged. Ambiguity is the mechanism, not the accident.'},
  {id:'ECONOMIC_MISREP',         name:'Economic Misrepresentation',  tag:'ACT IV NEW', def:'Misstating who bears the economic incidence of a policy — typically through a simplistic or reversed description of who pays a tax, fee, or tariff — in a way that contradicts basic economic consensus about how the relevant mechanism functions.'},
  {id:'MANDATE_OVERCLAIM',       name:'Mandate Overclaim',           tag:'ACT IV NEW', def:'Claiming an electoral result as a sweeping policy mandate when the margin, geographic distribution, or stated voter motivations do not support the scope of the authority claimed.'},
  {id:'SELECTIVE_SUMMARY',       name:'Selective Summary',           tag:'CARRYOVER',  def:'A technically sourced claim that omits material context, contradicting evidence, or qualifying information — such that the overall impression differs substantially from the documented record.'},
  {id:'FALSE_EQUIVALENCE',       name:'False Equivalence',           tag:'CARRYOVER',  def:'Treating two unlike situations as structurally identical to neutralize a criticism or deflect accountability. The comparison ignores material differences in scale, legality, or context.'},
  {id:'INSTITUTIONAL_DELEGIT',   name:'Institutional Delegitimization', tag:'CARRYOVER', def:'Framing a legitimate oversight body, law enforcement entity, intelligence agency, or electoral system as inherently corrupt or conspiratorial — without specific evidence — to preemptively discredit its findings.'},
];

// ── SCORING ───────────────────────────────────────────────────────────

function scoreRound(claim, verdict, citation, pattern, benklerGuess){
  const mult = S.difficulty === 'ASYMMETRIC' ? claim.weight : 1.0;
  const vPts  = verdict === claim.correctVerdict ? 100 : 0;
  const cTier = CITATION_TIERS.find(t => t.id === citation);
  const cPts  = cTier ? cTier.pts : 0;
  const cmPts = citation === claim.expectedCitation ? 15 : 0;
  const pPts  = pattern  === claim.correctPattern   ? 25 : 0;
  const bPts  = (S.difficulty === 'BENKLER' && benklerGuess === claim.benkler.displayImpact) ? 20 : 0;
  const raw   = vPts + cPts + cmPts + pPts + bPts;
  const total = Math.round(raw * mult);
  const maxBase = S.difficulty === 'BENKLER' ? 185 : 165;
  const maxTotal = Math.round(maxBase * mult);
  return { vPts, cPts, cmPts, pPts, bPts, raw, total, maxTotal, mult, benklerGuess, benklerCorrect: bPts > 0 };
}

  const r = S.roundResult;
  const ok = r.vPts > 0, cm = r.cmPts > 0, pm = r.pPts > 0;
  return `${classbar('FILE REVIEWED — RESULT FOLLOWS')}${header()}
  <div class="prog-rail"><div class="prog-fill" style="width:${(S.claimIndex+1)/CLAIMS.length*100}%"></div></div>
  <div class="prog-meta"><span>CLAIM ${S.claimIndex+1} OF ${CLAIMS.length}</span><span>SCORE <span class="sv">${S.totalScore}</span></span></div>

  <div class="result-card anim">
    <div class="result-hdr">
      <div class="vr ${ok?'CORRECT':'WRONG'}">${ok?'✓ CORRECT':'✗ WRONG'} — ${c.correctVerdict}</div>
      <div class="pts-earned">+${r.total}</div>
    </div>
    <div class="result-body">
      <div class="truth-box">${c.truthNote}</div>
      <p>${c.annotation}</p>
      <p style="font-size:11px;color:var(--text-dim);margin-top:8px;font-style:italic;">${c.citationNote}</p>
      <div class="rb-wrap">
        <div class="rb"><span class="rl">Verdict (${S.verdict})</span><span class="rv ${ok?'g':'b'}">+${r.vPts}</span></div>
        <div class="rb"><span class="rl">Citation: ${S.citation} (base +${r.cPts})</span><span class="rv">+${r.cPts}</span></div>
        <div class="rb"><span class="rl">Citation match${cm?' ✓':' ✗ expected '+c.expectedCitation}</span><span class="rv ${cm?'g':'b'}">+${r.cmPts}</span></div>
        <div class="rb"><span class="rl">Pattern${pm?' ✓':' ✗ expected '+c.correctPattern}</span><span class="rv ${pm?'g':'b'}">+${r.pPts}</span></div>
        ${S.difficulty==='ASYMMETRIC'?`<div class="rb"><span class="rl">Asymmetric ×${r.mult}</span><span class="rv">${r.raw} → ${r.total}</span></div>`:''}
        ${S.difficulty==='BENKLER'?`<div class="rb"><span class="rl">Benkler calibration${r.benklerCorrect?' ✓ '+r.benklerGuess:' ✗ you: '+r.benklerGuess+' / correct: '+c.benkler.displayImpact}</span><span class="rv ${r.benklerCorrect?'g':'b'}">+${r.bPts}</span></div>`:''}
        <div class="rb" style="border-bottom:none;"><span class="rl" style="font-weight:bold;">ROUND TOTAL</span><span class="rv" style="font-size:15px;">+${r.total} / ${r.maxTotal}</span></div>
      </div>
      ${S.difficulty==='BENKLER'?`
      <div class="benkler-result">
        <div class="benkler-result-hdr">BENKLER IMPACT ASSESSMENT</div>
        <div class="benkler-verdict-row">
          <span class="bvd ${c.benkler.displayImpact}">${c.benkler.displayImpact} IMPACT</span>
          <span class="bvd-user ${r.benklerCorrect?'match':'miss'}">${r.benklerCorrect?'✓ Your calibration matched':'✗ You said '+r.benklerGuess}</span>
        </div>
        <div class="benkler-axes">
          <div class="baxis"><span class="baxis-label">Historical Impact</span><span class="baxis-val">${c.benkler.historicalImpact}/4</span></div>
          <div class="baxis"><span class="baxis-label">Resistance to Debunking</span><span class="baxis-val">${c.benkler.persistence}/4</span></div>
          <div class="baxis"><span class="baxis-label">Institutional Power</span><span class="baxis-val">${c.benkler.institutionalPower}/4</span></div>
          <div class="baxis" style="border-bottom:none;"><span class="baxis-label">Composite Score</span><span class="baxis-val">${c.benkler.score.toFixed(2)}/4.0</span></div>
        </div>
        <div class="benkler-explain">${c.benkler.explanation}</div>
      </div>`:''}
    </div>
  </div>
  <button class="next-btn" id="nextBtn">${S.claimIndex+1 < CLAIMS.length ? 'NEXT CLAIM →' : 'VIEW FINAL SCORE →'}</button>
  <div style="height:20px;"></div>`;
}

function renderFinal(){
  const pct = S.maxPossible > 0 ? Math.round(S.totalScore/S.maxPossible*100) : 0;
  const grades = [[90,'Constitutional analyst. The record holds.'],[75,'Solid work on the new administration\'s record.'],[55,'Several governance patterns slipped through.'],[35,'The Act IV file disputes most of your analysis.'],[0,'The record was less cooperative than expected.']];
  const grade = grades.find(g => pct >= g[0])[1];
  const hall = getHall();
  const act4hall = hall.filter(e => e.act === 'IV');
  const allHall = hall.slice(0, 8);
  return `${classbar('ACT IV — REVIEW COMPLETE')}${header()}
  <div class="final-wrap anim">
    ${S.difficulty==='BENKLER'?`
    <div class="benkler-final">
      <div class="bf-hdr">⬡ BENKLER CALIBRATION — FINAL ASSESSMENT</div>
      <div class="bf-row"><span class="bf-label">Claims calibrated correctly</span><span class="bf-val">${S.benklerCorrect} / ${CLAIMS.length}</span></div>
      <div class="bf-row"><span class="bf-label">Calibration accuracy</span><span class="bf-val">${Math.round(S.benklerCorrect/CLAIMS.length*100)}%</span></div>
      <div class="bf-row"><span class="bf-label">CRITICAL claims in this act</span><span class="bf-val">${CLAIMS.filter(c=>c.benkler.displayImpact==='CRITICAL').length}</span></div>
      <div class="bf-row" style="border-bottom:none;"><span class="bf-label">Your calibration bonus points</span><span class="bf-val">+${S.benklerCorrect * 20}</span></div>
    </div>`:''}

    <div class="final-score">
      <div class="fl">FINAL SCORE — ACT IV</div>
      <div class="fp">${S.totalScore}</div>
      <div class="fm">out of ${S.maxPossible} possible (${pct}%)</div>
      <div class="fg">${grade}</div>
    </div>

    <div class="hall-wrap">
      <div class="hall-hdr">⚠ HALL OF SHAME — ALL ACTS (${allHall.length} entries shown)</div>
      ${allHall.length === 0
        ? '<div class="hall-empty">Clean record across all acts. File closed.</div>'
        : allHall.map(e=>`<div class="hall-entry"><div class="he-text">Act ${e.act}: ${e.claimText}</div><div class="he-wrong">Your: ${e.yourVerdict} · Correct: ${e.correctVerdict} · ${e.pts}</div></div>`).join('')}
    </div>

    <div class="acts-nav">
      <a class="nav-btn" href="declassified-act2-v3.html">← ACT II: THE RECORD</a>
      <span class="nav-btn active">ACT IV — ACTIVE</span>
    </div>
    <button class="replay-btn" id="replayBtn">REPLAY ACT IV</button>
  </div>`;
}

// ── BIND ─────────────────────────────────────────────────────────────

function bind(){
  if(S.screen === 'intro'){
    $('btnSym')?.addEventListener('click',     ()=>{ S.difficulty='SYMMETRIC';  render(); });
    $('btnAsym')?.addEventListener('click',    ()=>{ S.difficulty='ASYMMETRIC'; render(); });
    $('btnBenkler')?.addEventListener('click', ()=>{ S.difficulty='BENKLER';    render(); });
    $('startBtn')?.addEventListener('click',   ()=>{ if(!S.difficulty) return; S.screen='game'; render(); });
  }
  if(S.screen === 'game'){
    document.querySelectorAll('[data-v]').forEach(b => b.addEventListener('click', ()=>{
      S.verdict=b.dataset.v; S.citation=null; S.pattern=null; S.benklerGuess=null; render();
    }));
    document.querySelectorAll('[data-c]').forEach(b => b.addEventListener('click', ()=>{
      S.citation=b.dataset.c; S.pattern=null; S.benklerGuess=null; render();
    }));
    document.querySelectorAll('[data-p]').forEach(b => b.addEventListener('click', ()=>{
      S.pattern=b.dataset.p; render();
    }));
    document.querySelectorAll('[data-b]').forEach(b => b.addEventListener('click', ()=>{
      S.benklerGuess=b.dataset.b; render();
    }));
    $('openLib')?.addEventListener('click', ()=>{ $('libOverlay').classList.add('open'); });
    $('subBtn')?.addEventListener('click', ()=>{
      const needBenkler = S.difficulty === 'BENKLER';
      if(!S.verdict||!S.citation||!S.pattern||(needBenkler&&!S.benklerGuess)) return;
      const c = CLAIMS[S.claimIndex];
      const r = scoreRound(c, S.verdict, S.citation, S.pattern, S.benklerGuess);
      S.roundResult = r;
      S.totalScore  += r.total;
      S.maxPossible += r.maxTotal;
      if(r.benklerCorrect) S.benklerCorrect++;
      if(needBenkler) S.benklerTotal++;
      S.answers.push({ claimId:c.id, verdict:S.verdict, citation:S.citation, pattern:S.pattern, benklerGuess:S.benklerGuess, result:r });
      if(r.total/r.maxTotal < 0.5 || S.verdict !== c.correctVerdict){
        pushHall({ act:'IV', claimId:c.id, claimText:c.text.substring(0,90)+'…',
          yourVerdict:S.verdict, correctVerdict:c.correctVerdict,
          pts:r.total+'/'+r.maxTotal, ts:Date.now() });
      }
      S.screen='result'; render();
    });
  }
  if(S.screen === 'result'){
    $('nextBtn')?.addEventListener('click', ()=>{
      if(S.claimIndex+1 < CLAIMS.length){
        S.claimIndex++; S.verdict=null; S.citation=null; S.pattern=null; S.benklerGuess=null; S.screen='game';
      } else {
        S.screen='final'; saveS();
      }
      render();
    });
  }
  if(S.screen === 'final'){
    $('replayBtn')?.addEventListener('click', ()=>{
      localStorage.removeItem(STORAGE_KEY);
      S={ screen:'intro', difficulty:null, claimIndex:0, totalScore:0, maxPossible:0,
          answers:[], verdict:null, citation:null, pattern:null, benklerGuess:null, benklerCorrect:0, benklerTotal:0, roundResult:null };
      render();
    });
  }
  $('closeLib')?.addEventListener('click', ()=>{ $('libOverlay').classList.remove('open'); });
  $('libOverlay')?.addEventListener('click', (e)=>{ if(e.target===$('libOverlay')) $('libOverlay').classList.remove('open'); });
}

function populateLib(){
  const el = $('libEntries');
  if(!el) return;
  el.innerHTML = PATTERNS.map(p=>`<div class="lib-entry">
    <div class="lib-tag">${p.tag}</div>
    <div class="lib-name">${p.name}</div>
    <div class="lib-def">${p.def}</div>
  </div>`).join('');
}

function render(){
  const m = { intro:renderIntro, game:renderGame, result:renderResult, final:renderFinal };
  $a().innerHTML = (m[S.screen]||renderIntro)();
  bind(); populateLib(); window.scrollTo(0,0);
}

loadS(); render();
</script>
</body>
