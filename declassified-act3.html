<style>
  :root {
    --bg: #00060e; --bg2: #041228; --bg3: #081a38; --bg4: #0d2248;
    --accent: #2255bb; --accent-dim: #14306e;
    --green: #2dff6e; --red: #ff3c3c; --amber: #FFCB05;
    --amber-bright: #FFD740; --amber-dim: #C9A000;
    --blue: #5bb4ff; --orange: #ff9933;
    --text: #F0EAD2; --text-dim: #6a7890; --text-mid: #9aacbc;
    --border: #0a1e3c; --classify: #00274C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;line-height:1.5;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:9999;}
  body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:9998;}
  #app{max-width:660px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
  .classbar{background:var(--classify);color:#aabcee;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.25em;text-align:center;padding:6px 12px;text-transform:uppercase;user-select:none;border-bottom:1px solid var(--accent);}
  .act-header{padding:22px 20px 14px;border-bottom:1px solid var(--border);}
  .act-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.3em;color:var(--accent-dim);text-transform:uppercase;margin-bottom:5px;}
  .act-title{font-family:'Special Elite',serif;font-size:22px;color:var(--amber);line-height:1.2;margin-bottom:3px;}
  .act-sub{font-size:11px;color:var(--text-dim);letter-spacing:.08em;}
  .intro-body{padding:18px 20px;}
  .info-block{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 16px;margin-bottom:14px;font-size:12px;line-height:1.6;}
  .info-block p+p{margin-top:8px;}
  .sec-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.3em;color:var(--amber);text-transform:uppercase;margin-bottom:8px;display:block;}
  .hall-import{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--red);margin-bottom:14px;}
  .hall-import-hdr{padding:9px 14px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--red);text-transform:uppercase;border-bottom:1px solid var(--border);}
  .hi-entry{padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;}
  .hi-entry:last-child{border-bottom:none;}
  .hi-text{color:var(--text-dim);font-style:italic;margin-bottom:2px;}
  .hi-none{padding:10px 14px;font-size:11px;color:var(--text-dim);font-style:italic;}
  .diff-wrap{background:var(--bg2);border:1px solid var(--border);padding:14px 16px;margin-bottom:14px;}
  .diff-note{font-size:11px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
  .diff-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .diff-btn{background:var(--bg3);border:2px solid var(--border);color:var(--text);font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;padding:14px 10px;cursor:pointer;text-align:center;transition:all .14s;-webkit-tap-highlight-color:transparent;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .diff-btn .dn{font-size:14px;color:var(--amber);}
  .diff-btn .dd{font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-weight:400;letter-spacing:0;}
  .diff-btn.sel{border-color:var(--amber);background:#1a1408;}
  .diff-btn:active{opacity:.65;}
  .start-btn{display:block;width:100%;background:var(--amber);color:var(--classify);font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:18px;border:none;cursor:pointer;margin-top:18px;-webkit-tap-highlight-color:transparent;transition:opacity .14s;}
  .start-btn:active{opacity:.7;}
  .start-btn:disabled{background:var(--bg3);color:var(--text-dim);cursor:not-allowed;}
  .prog-rail{background:var(--bg3);height:3px;}

  .prog-meta{display:flex;justify-content:space-between;padding:7px 20px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);}
  .prog-meta .sv{color:var(--amber);font-weight:bold;}
  .claim-card{margin:14px 20px 0;background:var(--bg2);border:1px solid var(--border);}
  .claim-id{background:var(--border);padding:6px 12px;font-size:10px;letter-spacing:.18em;color:var(--text-dim);display:flex;justify-content:space-between;}
  .claim-id .wb{color:var(--red);}
  .claim-text{font-family:'Special Elite',serif;font-size:17px;line-height:1.55;padding:14px 16px;color:#dce4f0;border-left:3px solid var(--red);font-style:italic;}
  .step-box{margin:10px 20px 0;background:var(--bg2);border:1px solid var(--border);}
  .step-hdr{background:var(--bg3);padding:8px 14px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
  .step-hdr .ss{font-size:10px;}
  .step-hdr .ss.done{color:var(--green);}
  .step-body{padding:12px 14px;}
  .verdict-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
  .vbtn{background:var(--bg3);border:2px solid var(--border);color:var(--text);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;padding:12px 6px;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .vbtn:active{opacity:.6;}
  .vbtn.sv-TRUE{border-color:var(--green);color:var(--green);background:#0a1f0f;}
  .vbtn.sv-FALSE{border-color:var(--red);color:var(--red);background:#1f0a0a;}
  .vbtn.sv-MISLEADING{border-color:var(--amber);color:var(--amber);background:#1a1408;}
  .vbtn.sv-INSUFFICIENT{border-color:var(--blue);color:var(--blue);background:#0a1220;}
  .v-hint{margin-top:8px;font-size:10px;color:var(--text-dim);line-height:1.4;padding-top:6px;border-top:1px solid var(--border);}
  .bogost-lbl{font-family:'Oswald',sans-serif;font-size:10px;color:var(--accent-dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
  .cit-grid{display:flex;flex-direction:column;gap:6px;}
  .cbtn{background:var(--bg3);border:2px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .12s;-webkit-tap-highlight-color:transparent;display:grid;grid-template-columns:90px 1fr 36px;gap:8px;align-items:start;}
  .cbtn .cn{font-weight:bold;font-size:12px;}
  .cbtn .cd{font-size:10px;color:var(--text-dim);line-height:1.3;}
  .cbtn .cp{font-size:11px;color:var(--accent-dim);text-align:right;}
  .cbtn:active{opacity:.6;}
  .cbtn.sc-STRONG{border-color:var(--green);background:#0a1a0f;} .cbtn.sc-STRONG .cn{color:var(--green);}
  .cbtn.sc-CAREFUL{border-color:var(--amber);background:#1a1408;} .cbtn.sc-CAREFUL .cn{color:var(--amber);}
  .cbtn.sc-WEAK{border-color:var(--orange);background:#1a1008;} .cbtn.sc-WEAK .cn{color:var(--orange);}
  .cbtn.sc-INSUF_CIT{border-color:var(--red);background:#1a0808;} .cbtn.sc-INSUF_CIT .cn{color:var(--red);}
  .cit-note{margin-top:7px;font-size:10px;color:var(--text-dim);line-height:1.4;border-top:1px solid var(--border);padding-top:6px;}
  .lib-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px;}
  .lib-overlay.show{display:flex;}
  .lib-sheet{background:var(--bg);border:1px solid var(--border);max-width:500px;max-height:80vh;overflow-y:auto;border-radius:2px;position:relative;}
  .lib-sheet-hdr{background:var(--classify);color:var(--amber);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;}
  .close-lib{background:transparent;border:none;color:var(--amber);font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .lib-intro{padding:12px 14px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);line-height:1.5;}
  .lib-entry{padding:12px 14px;border-bottom:1px solid var(--border);}
  .lib-entry-name{font-family:'Oswald',sans-serif;font-size:12px;color:var(--amber);letter-spacing:.1em;margin-bottom:5px;text-transform:uppercase;}
  .lib-entry-def{font-size:11px;color:var(--text-dim);line-height:1.6;}
  .lib-entry-tag{font-size:9px;color:var(--orange);margin-top:4px;}
  .result-screen{padding:20px;}
  .result-title{font-family:'Special Elite',serif;font-size:20px;color:var(--amber);margin-bottom:14px;}
  .result-box{background:var(--bg2);border:1px solid var(--border);padding:12px;margin-bottom:12px;font-size:12px;line-height:1.6;}
  .result-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.15em;color:var(--blue);text-transform:uppercase;margin-bottom:5px;}
  .result-pts{font-family:'Oswald',sans-serif;font-size:28px;color:var(--amber);margin:5px 0;}
  .final-wrap{margin-top:20px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--amber);}
  .final-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
  .final-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fstat{background:var(--bg3);padding:10px;text-align:center;}
  .fstat-num{font-family:'Oswald',sans-serif;font-size:24px;color:var(--amber);font-weight:700;}
  .fstat-label{font-size:9px;color:var(--text-dim);letter-spacing:.1em;margin-top:3px;}
  .restart-btn{display:block;width:100%;background:var(--amber);color:var(--classify);font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:14px;border:none;cursor:pointer;margin-top:16px;-webkit-tap-highlight-color:transparent;transition:opacity .14s;}
  .restart-btn:active{opacity:.7;}
  .nav-home{display:block;text-align:center;margin:14px 20px 0;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;text-decoration:none;padding:10px;border:1px solid var(--border);}
  .nav-home:hover{color:var(--amber);border-color:var(--amber);}
  @media(max-width:480px){
    .diff-options{grid-template-columns:1fr;}
    .verdict-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>

<div id="app"></div>
<div class="lib-overlay" id="libOverlay">
  <div class="lib-sheet">
    <div class="lib-sheet-hdr">PATTERN LIBRARY — ACT III<button class="close-lib" id="closeLib">✕</button></div>
    <div class="lib-intro">Act III introduces two new patterns alongside the foundational Act I set. All definitions describe rhetorical mechanisms — not intent.</div>
    <div id="libEntries"></div>
  </div>
</div>
<script>
const PATTERNS = [
  {id:'INSTITUTIONAL_DELEGIT', name:'Institutional Delegitimization', tag:'ACT I + III', def:'Framing a legitimate oversight body, court, or institution as inherently corrupt or conspiratorial without specific evidence — to preemptively discredit its findings or rulings.'},
  {id:'SELECTIVE_SUMMARY',     name:'Selective Summary',              tag:'ACT I + III', def:'A technically sourced claim that omits material context, contradicting evidence, or disqualifying information — such that the overall impression differs from the documented record.'},
  {id:'MANDATE_OVERCLAIM',     name:'Mandate Overclaim',              tag:'ACT I + III', def:'Claiming authority, power, or legal right in a scope that the applicable law, constitution, or documented record does not support.'},
  {id:'INFLATED_METRIC',       name:'Inflated Metric',                tag:'ACT I + III', def:'Citing a numerical figure accurate in isolation but systematically overstated through definitional expansion, projection, or selective counting.'},
  {id:'VICTIM_NARRATIVE',      name:'Victim Narrative',               tag:'ACT III NEW', def:'Reframing documented legal accountability — charges, trials, convictions, or civil proceedings — as evidence of persecution, conspiracy, or political targeting, without addressing the substance of the underlying conduct.'},
  {id:'PREEMPTIVE_EXONERATION',name:'Preemptive Exoneration',        tag:'ACT III NEW', def:'Asserting immunity, justification, or absolution from legal or factual accountability before — or in lieu of — engaging with the documented record of the underlying conduct.'},
];

const CITATION_TIERS = [
  {id:'STRONG',    name:'STRONG',       desc:'Primary source, official record, or direct documentation',         pts:25},
  {id:'CAREFUL',   name:'CAREFUL',      desc:'Expert consensus, major institutional or multi-source reporting',   pts:15},
  {id:'WEAK',      name:'WEAK',         desc:'Contested, partisan, or secondary-source basis only',               pts:5},
  {id:'INSUF_CIT', name:'INSUFFICIENT', desc:'No credible or identifiable evidentiary basis',                    pts:0},
];

const CLAIMS = [
  {
    id:'a3_01', year:'2021',
    text:'"The 2020 election was stolen from us. We won by a landslide and everyone knows it."',
    correctVerdict:'FALSE', weight:1.9,
    expectedCitation:'STRONG', correctPattern:'INSTITUTIONAL_DELEGIT',
    annotation:'More than 60 courts — including judges appointed by Trump — dismissed challenges to the 2020 election results for lack of evidence. Attorney General William Barr stated the DOJ found no evidence of fraud sufficient to change the outcome. CISA Director Chris Krebs, who oversaw election security, certified the election as the most secure in American history. Georgia recounted ballots three times; results held. Arizona\'s Republican-led audit confirmed Biden won. No state legislature, secretary of state, or court of competent jurisdiction found fraud sufficient to alter the outcome.',
    truthNote:'60+ courts rejected fraud claims. AG Barr: no evidence of fraud sufficient to change the outcome. CISA confirmed security. Georgia recounted three times. Biden won.',
    citationNote:'STRONG: court records, DOJ statements, CISA certification, state recount results, and election official testimony are all primary documentation.'
  },
  {
    id:'a3_02', year:'2021',
    text:'"January 6 was a loving crowd. They were hugging and kissing police. It was a beautiful day."',
    correctVerdict:'MISLEADING', weight:1.8,
    expectedCitation:'STRONG', correctPattern:'SELECTIVE_SUMMARY',
    annotation:'The Capitol breach resulted in 140 police officers injured, including broken ribs, crushed spinal discs, and lost fingers. Officer Brian Sicknick died the following day; two others died by suicide in the days after. More than 1,200 individuals were charged by DOJ; hundreds were convicted of assault, obstruction, seditious conspiracy, and related offenses. Surveillance footage, body camera recordings, and news photography document extensive violence. Senate hearings included police officer testimony describing the attack in detail. The claim selectively describes a subset of conduct while omitting the documented majority.',
    truthNote:'140 officers were injured. 1,200+ were charged. Multiple officers died. Court records and video document assault, obstruction, and seditious conspiracy.',
    citationNote:'STRONG: DOJ prosecution records, congressional testimony, medical records, and video documentation are primary sources.'
  },
  {
    id:'a3_03', year:'2021',
    text:'"Mike Pence had the right — maybe the duty — to send back the votes to the states."',
    correctVerdict:'FALSE', weight:1.8,
    expectedCitation:'STRONG', correctPattern:'MANDATE_OVERCLAIM',
    annotation:'The Vice President\'s role in certifying electoral votes is explicitly ministerial under the Constitution (Art. II, §1, cl. 3) and the Electoral Count Act. The VP opens the certificates and announces the vote — nothing more. No constitutional authority exists for the VP to reject, delay, or return electoral votes to states. Pence\'s own legal counsel, Judge J. Michael Luttig, advised him the claim had no basis. Every court that reviewed the legal theory — including Trump-appointed judges — rejected it. The Electoral Count Reform Act of 2022 was subsequently passed to clarify this ministerial role.',
    truthNote:'The VP\'s role is ministerial — open and announce. No authority to reject or return votes. Every court rejected the legal theory. Pence\'s own counsel opposed it.',
    citationNote:'STRONG: U.S. Constitution, Electoral Count Act, federal court decisions, Pence counsel memoranda, and Electoral Count Reform Act are all primary documentation.'
  },
  {
    id:'a3_04', year:'2021',
    text:'"Antifa was responsible for January 6. It was not Trump supporters."',
    correctVerdict:'FALSE', weight:1.6,
    expectedCitation:'STRONG', correctPattern:'SELECTIVE_SUMMARY',
    annotation:'DOJ prosecuted more than 1,200 individuals in connection with January 6. Every defendant charged was identified as a Trump supporter, member of organized groups such as the Oath Keepers and Proud Boys, or individual attendees of the Stop the Steal rally. FBI Director Christopher Wray testified before Congress that the Bureau found no evidence of Antifa or left-wing group coordination or participation in the attack. Leaders of the Oath Keepers and Proud Boys were convicted of seditious conspiracy. No individual identified as Antifa was charged.',
    truthNote:'DOJ charged 1,200+ individuals — all Trump supporters or affiliated groups. FBI: no evidence of Antifa involvement. Oath Keeper and Proud Boy leaders convicted of seditious conspiracy.',
    citationNote:'STRONG: DOJ prosecution records, FBI director congressional testimony, and court convictions are primary documentation.'
  },
  {
    id:'a3_05', year:'2022',
    text:'"All those documents at Mar-a-Lago were declassified by me before I left. They were automatically declassified."',
    correctVerdict:'MISLEADING', weight:1.7,
    expectedCitation:'CAREFUL', correctPattern:'MANDATE_OVERCLAIM',
    annotation:'No recognized legal process for automatic declassification by presidential intent exists. Executive Order 13526 and the National Security Act require a documented, formal declassification process. The National Archives and DOJ found 325 classified documents at Mar-a-Lago, including documents marked TOP SECRET/SCI. Trump\'s legal team produced no declassification orders, memoranda, or records establishing that any of the recovered documents had been formally declassified. Courts found no evidence of declassification. Even if a president could declassify by intent, no written records were produced to demonstrate that intent had been exercised for these specific documents.',
    truthNote:'No automatic declassification process exists. EO 13526 requires documented process. 325 classified documents recovered. No declassification records were produced.',
    citationNote:'CAREFUL: Executive Order 13526, National Security Act, DOJ court filings, and National Archives records document the requirements and findings.'
  },
  {
    id:'a3_06', year:'2022',
    text:'"The FBI planted evidence at Mar-a-Lago. This was a setup."',
    correctVerdict:'MISLEADING', weight:1.5,
    expectedCitation:'WEAK', correctPattern:'INSTITUTIONAL_DELEGIT',
    annotation:'The August 2022 search of Mar-a-Lago was authorized by a federal magistrate judge on a sworn warrant application. FBI agents photographed documents in place before moving them — a standard chain-of-custody procedure. Trump\'s own attorneys were present for portions of the process. The warrant and supporting affidavit were subsequently unsealed by court order. No evidence of planted evidence was ever produced, and no court found any impropriety in the search. The claim delegitimizes the federal judiciary and law enforcement without specific evidence of wrongdoing.',
    truthNote:'Search authorized by federal warrant. Documents photographed in place. Trump attorneys present. Warrant unsealed. No evidence of planted evidence was produced or found by any court.',
    citationNote:'WEAK: this is an institutional delegitimization claim without evidentiary basis. The documented record of the search process contradicts the claim.'
  },
  {
    id:'a3_07', year:'2021',
    text:'"I offered Nancy Pelosi 10,000 National Guard troops before January 6 and she turned them down."',
    correctVerdict:'MISLEADING', weight:1.4,
    expectedCitation:'WEAK', correctPattern:'SELECTIVE_SUMMARY',
    annotation:'No documented record of a formal 10,000-troop offer to Pelosi exists in the White House records, Pentagon records, or National Guard records. Acting Secretary of Defense Christopher Miller\'s account contradicts the characterization of a specific rejected offer. The Speaker of the House has no command authority over the National Guard — that authority rests with the President and state governors. Congressional investigators and the January 6 committee found no documentary evidence supporting the 10,000-troop offer claim. The claim selectively shifts responsibility without documentary basis.',
    truthNote:'No documentary record of a formal 10,000-troop offer exists. The Speaker has no Guard command authority. DOD records and January 6 committee findings contradict the claim.',
    citationNote:'WEAK: the claim lacks documentary support. Pentagon records, J6 committee findings, and military chain-of-command structure all contradict the specific assertion.'
  },
  {
    id:'a3_08', year:'2023',
    text:'"As a former President I have total and absolute immunity for everything I did in office."',
    correctVerdict:'MISLEADING', weight:1.9,
    expectedCitation:'CAREFUL', correctPattern:'PREEMPTIVE_EXONERATION',
    annotation:'The Supreme Court ruled in Trump v. United States, 603 U.S. ___ (2024), that former presidents have presumptive immunity for official acts taken while in office — but explicitly rejected the claim of "total and absolute" immunity. The Court held that unofficial acts receive no immunity protection. The Court remanded the case to lower courts to determine which alleged conduct qualifies as official versus unofficial acts. Chief Justice Roberts, writing for the majority, specifically stated that the immunity is "presumptive" not absolute, and that no president is above the law. The claim of total immunity was rejected by the Supreme Court.',
    truthNote:'SCOTUS (2024) held presumptive immunity for official acts only — not total immunity. Unofficial acts receive no immunity. The Court explicitly rejected "total and absolute" immunity.',
    citationNote:'CAREFUL: Trump v. United States (2024) is the controlling authority. The opinion was issued after the claim was made, but definitively resolved the legal question.'
  },
  {
    id:'a3_09', year:'2023',
    text:'"The January 6 defendants are hostages. They are political prisoners being held unjustly."',
    correctVerdict:'MISLEADING', weight:1.6,
    expectedCitation:'CAREFUL', correctPattern:'VICTIM_NARRATIVE',
    annotation:'"Political prisoner" has a defined meaning in international law: a person imprisoned for their political beliefs or identity without due process. The January 6 defendants were arrested, charged, represented by counsel, and tried in federal courts with full constitutional protections — including jury trials, appellate rights, and the right to present defenses. Hundreds were convicted of assault, obstruction, and seditious conspiracy based on documentary evidence including video and their own statements. The claim reframes criminal accountability as political persecution without addressing the documented conduct underlying the prosecutions.',
    truthNote:'"Political prisoner" requires imprisonment without due process. J6 defendants had full constitutional rights, jury trials, counsel, and appeals. Convictions were for documented, videotaped conduct.',
    citationNote:'CAREFUL: federal court records, constitutional due process standards, and international definitions of "political prisoner" provide the framework for evaluating this claim.'
  },
  {
    id:'a3_10', year:'2023',
    text:'"I am the most persecuted person in the history of our country. Worse than Lincoln."',
    correctVerdict:'MISLEADING', weight:1.2,
    expectedCitation:'WEAK', correctPattern:'VICTIM_NARRATIVE',
    annotation:'The claim of being the most persecuted person in American history is a subjective superlative without a defined metric. Historical figures who faced documented persecution without access to constitutional protections include: Abraham Lincoln (who was assassinated), Frederick Douglass (enslaved for years, denied legal personhood), Japanese-Americans interned during WWII without due process, civil rights activists imprisoned and killed, and Indigenous peoples subjected to forced removal. Trump\'s legal proceedings involved federal indictments with full constitutional protections, counsel, and procedural rights. The comparison to Lincoln — who was murdered — is historically unsustainable.',
    truthNote:'No defined metric for "most persecuted." Historical persecution includes assassination, enslavement, internment, and death. Trump faced indictments with full constitutional protections.',
    citationNote:'WEAK: the claim is subjective rhetoric with no verifiable metric. Historical documentation of actual persecution (without due process or legal protection) directly contradicts the scale of the claim.'
  },
];

const STORAGE_KEY = 'declassified_act3_v1';
const HALL_KEY = 'declassified_hall_of_shame';

let state = {
  screen: 'intro',
  difficulty: null,
  currentClaim: 0,
  scores: { totalScore: 0 },
  claimScores: [],
  verdictChosen: null,
  citationChosen: null,
  patternChosen: null,
  hall: []
};

function loadState(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) state = JSON.parse(s);
    const h = localStorage.getItem(HALL_KEY);
    if(h) state.hall = JSON.parse(h);
  }catch(e){}
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    localStorage.setItem(HALL_KEY, JSON.stringify(state.hall));
  }catch(e){}
}

function render(){
  const app = document.getElementById('app');
  if(state.screen === 'intro') renderIntro(app);
  else if(state.screen === 'game') renderGame(app);
  else if(state.screen === 'result') renderResult(app);
}

function renderIntro(app){
  const hallHtml = state.hall.length > 0 ? `
    <div class="hall-import">
      <div class="hall-import-hdr">⚠ Hall of Shame — Carried from All Acts</div>
      ${state.hall.slice(-5).map(h => `
        <div class="hi-entry">
          <div class="hi-text">${h.claim}</div>
          <div style="font-size:10px;margin-top:4px;color:var(--red);">You answered: ${h.answered} | Correct: ${h.correct}</div>
        </div>
      `).join('')}
    </div>
  ` : `
    <div class="hall-import">
      <div class="hi-none">No errors on record. Start Act III to build your record.</div>
    </div>
  `;

  app.innerHTML = `
    <div class="classbar">DECLASSIFIED — ACT III</div>
    <div class="act-header">
      <div class="act-label">ACT III — THE RECKONING</div>
      <h1 class="act-title">2021–2024</h1>
      <div class="act-sub">January 6 · The Big Lie · Mar-a-Lago · Immunity · The 2024 Campaign</div>
    </div>
    <div class="intro-body">
      <div class="info-block">
        <span class="sec-label">Context</span>
        <p>The post-presidency period generated the most constitutionally consequential claims in the series: the stolen election, the Capitol breach, classified document handling, and the assertion of total presidential immunity. Two new patterns enter the library: <strong>Victim Narrative</strong> and <strong>Preemptive Exoneration</strong>.</p>
        <p>Ten claims. All assessed against court records, federal statutes, and primary documentation. No partisan framing — the record is the arbiter.</p>
      </div>
      ${hallHtml}
      <div class="diff-wrap">
        <div class="diff-note">SYMMETRIC weights all claims equally. ASYMMETRIC applies Benkler Calibration — weighting claims by constitutional impact, persistence, and structural resistance to debunking.</div>
        <div class="diff-options">
          <button class="diff-btn${state.difficulty === 'SYMMETRIC' ? ' sel' : ''}" onclick="chooseDifficulty('SYMMETRIC')">
            <span class="dn">SYMMETRIC</span>
            <span class="dd">All claims weighted equally</span>
          </button>
          <button class="diff-btn${state.difficulty === 'ASYMMETRIC' ? ' sel' : ''}" onclick="chooseDifficulty('ASYMMETRIC')">
            <span class="dn">ASYMMETRIC</span>
            <span class="dd">Benkler Calibration active</span>
          </button>
        </div>
      </div>
      <button class="start-btn" onclick="startGame()" ${state.difficulty ? '' : 'disabled'}>Begin Act III — The Reckoning</button>
    </div>
    <a href="index.html" class="nav-home">← Back to All Acts</a>
  `;
}

function chooseDifficulty(d){
  state.difficulty = d;
  render();
}

function startGame(){
  state.screen = 'game';
  state.currentClaim = 0;
  state.claimScores = [];
  state.scores = { totalScore: 0 };
  state.verdictChosen = null;
  state.citationChosen = null;
  state.patternChosen = null;
  saveState();
  render();
}

function renderGame(app){
  const claim = CLAIMS[state.currentClaim];
  const progress = Math.round((state.currentClaim / CLAIMS.length) * 100);

  app.innerHTML = `
    <div class="classbar">ACT III — CLAIM ${state.currentClaim + 1} / ${CLAIMS.length}</div>
    <div class="prog-rail"><div class="prog-fill" style="width:${progress}%"></div></div>
    <div class="prog-meta">
      <span>${state.currentClaim + 1} of ${CLAIMS.length}</span>
      <span class="sv">${state.scores.totalScore} pts</span>
    </div>
    <div class="claim-card">
      <div class="claim-id">
        <span>CLAIM ${state.currentClaim + 1}</span>
        <span class="wb">${claim.year}</span>
      </div>
      <div class="claim-text">${claim.text}</div>
    </div>
    <div class="step-box">
      <div class="step-hdr">
        <span>STEP 1: VERDICT</span>
        <span class="ss${state.verdictChosen ? ' done' : ''}">→ Assess the claim</span>
      </div>
      <div class="step-body">
        <div class="verdict-grid">
          <button class="vbtn sv-TRUE${state.verdictChosen === 'TRUE' ? ' sel' : ''}" onclick="setVerdict('TRUE')">
            <span style="font-size:14px;">✓</span><span>TRUE</span>
          </button>
          <button class="vbtn sv-FALSE${state.verdictChosen === 'FALSE' ? ' sel' : ''}" onclick="setVerdict('FALSE')">
            <span style="font-size:14px;">✗</span><span>FALSE</span>
          </button>
          <button class="vbtn sv-MISLEADING${state.verdictChosen === 'MISLEADING' ? ' sel' : ''}" onclick="setVerdict('MISLEADING')">
            <span style="font-size:12px;">≈</span><span>MISLEADING</span>
          </button>
          <button class="vbtn sv-INSUFFICIENT${state.verdictChosen === 'INSUFFICIENT' ? ' sel' : ''}" onclick="setVerdict('INSUFFICIENT')">
            <span style="font-size:12px;">?</span><span>INSUFFICIENT</span>
          </button>
        </div>
        <div class="v-hint">Assess against the documented record — court decisions, official statements, federal statutes.</div>
      </div>
    </div>
    ${state.verdictChosen ? `
      <div class="step-box">
        <div class="step-hdr">
          <span>STEP 2: EVIDENCE TIER</span>
          <span class="ss${state.citationChosen ? ' done' : ''}">→ Assess the source</span>
        </div>
        <div class="step-body">
          <div class="bogost-lbl">Bogost Citation Scale</div>
          <div class="cit-grid">
            ${CITATION_TIERS.map(t => `
              <button class="cbtn sc-${t.id}${state.citationChosen === t.id ? ' sel' : ''}" onclick="setCitation('${t.id}')">
                <div class="cn">${t.name}</div>
                <div class="cd">${t.desc}</div>
                <div class="cp">+${t.pts}</div>
              </button>
            `).join('')}
          </div>
          <div class="cit-note">Rate the quality of the evidentiary record behind this claim.</div>
        </div>
      </div>
    ` : ''}
    ${state.citationChosen ? `
      <div class="step-box">
        <div class="step-hdr">
          <span>STEP 3: PATTERN</span>
          <span class="ss${state.patternChosen ? ' done' : ''}">→ Identify mechanism</span>
        </div>
        <div class="step-body">
          <button onclick="openLibrary()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 12px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;-webkit-tap-highlight-color:transparent;">📚 Pattern Library</button>
          <div style="display:grid;grid-template-columns:1fr;gap:6px;">
            ${PATTERNS.map(p => `
              <button class="cbtn${state.patternChosen === p.id ? ' sel' : ''}" onclick="setPattern('${p.id}')" style="grid-template-columns:auto 1fr;padding:8px 12px;">
                <div class="cn" style="color:var(--amber);">${p.name}</div>
                <div class="cd">${p.tag}</div>
              </button>
            `).join('')}
          </div>
          <div class="cit-note">Identify the rhetorical mechanism — not just that the claim is wrong, but how it misleads.</div>
        </div>
      </div>
    ` : ''}
    ${state.patternChosen ? `
      <div style="margin:10px 20px 0;padding:14px;background:var(--bg2);border:1px solid var(--border);text-align:center;">
        <button onclick="submitClaim()" style="background:var(--red);color:#fff;border:none;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;padding:12px 16px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;width:100%;">→ SUBMIT & NEXT</button>
      </div>
    ` : ''}
  `;
}

function setVerdict(v){ state.verdictChosen = v; render(); }
function setCitation(c){ state.citationChosen = c; render(); }
function setPattern(p){ state.patternChosen = p; render(); }
function openLibrary(){ document.getElementById('libOverlay').classList.add('show'); }
function closeLibrary(){ document.getElementById('libOverlay').classList.remove('show'); }

function submitClaim(){
  const claim = CLAIMS[state.currentClaim];
  const correct = state.verdictChosen === claim.correctVerdict;
  let pts = 0;
  if(correct) pts += 50;
  const citTier = CITATION_TIERS.find(t => t.id === state.citationChosen);
  pts += citTier.pts;
  if(state.patternChosen === claim.correctPattern) pts += 25;
  if(state.difficulty === 'ASYMMETRIC') pts = Math.round(pts * claim.weight);
  state.claimScores.push({ claimId: claim.id, points: pts, correct });
  state.scores.totalScore += pts;
  if(!correct){
    state.hall.push({
      claim: claim.text.substring(0, 60) + '...',
      answered: state.verdictChosen,
      correct: claim.correctVerdict
    });
  }
  state.currentClaim++;
  state.verdictChosen = null;
  state.citationChosen = null;
  state.patternChosen = null;
  if(state.currentClaim >= CLAIMS.length) state.screen = 'result';
  saveState();
  render();
}

function renderResult(app){
  const correct = state.claimScores.filter(c => c.correct).length;
  const accuracy = Math.round((correct / CLAIMS.length) * 100);
  const grade = accuracy >= 90 ? 'PRIMARY SOURCE' : accuracy >= 70 ? 'CORROBORATED' : accuracy >= 50 ? 'CONTESTED' : 'INSUFFICIENT';
  app.innerHTML = `
    <div class="classbar">ACT III — COMPLETE</div>
    <div class="result-screen">
      <div class="result-title">Act III: Final Assessment</div>
      <div class="result-box">
        <div class="result-label">Total Score</div>
        <div class="result-pts">${state.scores.totalScore}</div>
      </div>
      <div class="result-box">
        <div class="result-label">Accuracy</div>
        <div style="font-size:20px;color:var(--amber);margin:5px 0;">${accuracy}% — ${correct}/${CLAIMS.length} correct</div>
        <div style="font-size:11px;color:var(--text-dim);">Analyst Rating: <span style="color:var(--amber);">${grade}</span></div>
      </div>
      <div class="final-wrap">
        <div class="final-label">Act III Statistics</div>
        <div class="final-stats">
          <div class="fstat"><div class="fstat-num">${correct}</div><div class="fstat-label">Correct Verdicts</div></div>
          <div class="fstat"><div class="fstat-num">${accuracy}%</div><div class="fstat-label">Verdict Accuracy</div></div>
          <div class="fstat"><div class="fstat-num">${state.scores.totalScore}</div><div class="fstat-label">Total Points</div></div>
          <div class="fstat"><div class="fstat-num">${state.difficulty}</div><div class="fstat-label">Mode</div></div>
        </div>
      </div>
      <button class="restart-btn" onclick="restartAct()">↩ Replay Act III</button>
      <a href="declassified-act4.html" class="restart-btn" style="display:block;text-align:center;text-decoration:none;margin-top:10px;background:var(--classify);color:var(--amber);border:1px solid var(--amber);">→ Continue: Act IV (2024–2026)</a>
      <a href="index.html" class="nav-home" style="margin-top:10px;">← All Acts</a>
    </div>
  `;
}

function restartAct(){
  state = { screen:'intro', difficulty:null, currentClaim:0, scores:{totalScore:0}, claimScores:[], verdictChosen:null, citationChosen:null, patternChosen:null, hall:state.hall };
  saveState();
  render();
}

document.getElementById('closeLib').addEventListener('click', closeLibrary);
document.getElementById('libOverlay').addEventListener('click', e => { if(e.target.id === 'libOverlay') closeLibrary(); });

const libEntries = document.getElementById('libEntries');
PATTERNS.forEach(p => {
  const el = document.createElement('div');
  el.className = 'lib-entry';
  el.innerHTML = `<div class="lib-entry-name">${p.name}</div><div class="lib-entry-def">${p.def}</div><div class="lib-entry-tag">${p.tag}</div>`;
  libEntries.appendChild(el);
});

loadState();
render();
</script>
</body>
</html>
